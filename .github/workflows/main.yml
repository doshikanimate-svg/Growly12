name: Keep Render Awake

on:
  schedule:
    - cron: "*/7 * * * *" # Каждые 7 минут
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          echo "Pinging at $(date)"
          curl -s -v --connect-timeout 30 --max-time 60 https://growly12.onrender.com/api/health
